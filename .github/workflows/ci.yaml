name: Python CI

on:
  push:
    branches:
      - master
      - bugfix/*
      - feature/*
      - chore/*
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Python CI Job
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Calculate Version
        id: semver
        uses: ietf-tools/semver-action@v1
        with:
          token: ${{ github.token }}
          branch: ${{ github.ref_name }}
          minorList: "feat"
          patchList: "fix,chore,ci,docs,style,refactor,perf,test"

      - name: Build staging image
        run: |
          echo "Next version: ${{ steps.semver.outputs.nextStrict }}"
          docker build -f docker/Dockerfile --target staging -t draft.python.api:staging .

      - name: Run checks
        run: |
          docker run --rm draft.python.api:staging
